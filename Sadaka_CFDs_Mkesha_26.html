<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
    const db = database.ref("Sadaka_CFDs_Mkesha_26");
    const usersDb = database.ref("Users"); // Reference to your Users node

    let datePickerInstance; // Renamed to avoid confusion and clearly mark as the Flatpickr instance
    let currentUserRole = null; // To store the role of the logged-in user

    // Function to show/hide elements based on role
    function applyRoleRestrictions(role) {
        if (role === 'guest') {
            // Disable Add Transaction button
            const addTransactionButton = document.querySelector('.btn.btn-primary.ms-auto');
            if (addTransactionButton) { // Check if the button exists
                 addTransactionButton.style.display = 'none';
            }

            // The Edit/Delete buttons in the table are handled dynamically in load()
            // by setting them to disabled.
        } else if (role === 'admin') {
            // Admin can do everything, so ensure buttons are visible
            const addTransactionButton = document.querySelector('.btn.btn-primary.ms-auto');
            if (addTransactionButton) { // Check if the button exists
                addTransactionButton.style.display = '';
            }
            // Edit/Delete buttons will be shown by default (enabled) in load() for admin
        }
    }

    // Passcode prompt function
    async function promptForPasscode() {
        let passcode = null;
        let adminPasscode = null;
        let guestPasscode = null;

        // Fetch passcodes from Firebase first
        await usersDb.once("value", snap => {
            const usersData = snap.val();
            if (usersData) {
                adminPasscode = usersData.Admin;
                guestPasscode = usersData.Guest;
            }
        });

        while (true) {
            passcode = prompt("Please enter your passcode:");
            if (passcode === null) {
                // User cancelled the prompt, keep asking or refresh page.
                // For this example, we'll keep prompting.
                alert("Passcode is required to access the application.");
                continue;
            }

            if (passcode === String(adminPasscode)) {
                currentUserRole = 'admin';
                alert("Welcome Admin!");
                break;
            } else if (passcode === String(guestPasscode)) {
                currentUserRole = 'guest';
                alert("Welcome Guest!");
                break;
            } else {
                alert("Invalid passcode. Please try again.");
            }
        }
        // Once authenticated, load the data and apply restrictions
        load();
        applyRoleRestrictions(currentUserRole);
    }

    // MODIFIED: Helper to initialize Select2 with custom placeholders per filter
    function initSelect2Filters() {
        // Destroy existing instances to avoid duplication
        $('.select2-hidden-accessible').each(function() {
            $(this).select2('destroy');
        });

        // Define custom placeholder text for each filter
        const placeholders = {
            filterMonth: " Month...",
            filterDate: " Date...",
            filterUid: " UID...",
            filterName: " Name...",
            filterDescription: " Description...",
            filterAmount: " Amount..."
        };

        // Initialize each filter with its own placeholder
        for (let id in placeholders) {
            $(`#${id}`).select2({
                theme: 'bootstrap-5',
                width: '100%',
                placeholder: placeholders[id],
                allowClear: false,
                dropdownParent: $('.d-flex.align-items-end.mb-3')[0] // Ensure dropdownParent is a DOM element
            });
        }
        // Reattach filter event after Select2 change
        $('#filterMonth, #filterDate, #filterUid, #filterName, #filterDescription, #filterAmount').off('change').on('change', function() {
            filterTable();
        });
    }

    function load() {
        db.on("value", snap => {

            let data = snap.val();

            let tbody = document.getElementById("tbody");

            tbody.innerHTML = "";

            let total = 0;

            // IMPORTANT FIX: sn is now incremented within filterTable()
            // and `sn` is not used directly here for table rendering anymore.
            // The row serial numbers will be assigned after filtering.

            /* IMPORTANT FIX */
            if (!data) {
                // If no data, ensure filters are initialized and table is empty
                initSelect2Filters(); // Initialize Select2 even with no data
                filterTable(); // Call filterTable to reset SN and total
                return;
            }

            // Convert data object to an array for easier filtering/sorting later if needed
            const dataArray = Object.keys(data).map(key => ({
                key,
                ...data[key]
            }));

            // Store the data array for filtering
            // (You might want to store this globally or pass it to filterTable)
            // For simplicity, we'll re-process in filterTable for now, but
            // for performance, it's better to process the full data once.

            let months = new Set();
            let dates = new Set();
            let uids = new Set();
            let names = new Set();
            let descriptions = new Set();
            let amounts = new Set();

            dataArray.forEach(r => {
                let dateStr = r.date;
                let parts = dateStr.split(/[-\/]/);
                let monthNum;
                if (parts.length === 3) {
                    if (parts[0].length === 4) { // assume YYYY-MM-DD
                        monthNum = parseInt(parts[1]);
                    } else { // assume DD-MM-YYYY
                        monthNum = parseInt(parts[1]);
                    }
                } else {
                    let dateObj = new Date(dateStr);
                    monthNum = dateObj.getMonth() + 1;
                }
                months.add(monthNum);
                dates.add(r.date);
                uids.add(r.uid);
                names.add(r.name);
                descriptions.add(r.description);
                amounts.add(r.amount);
            });

            // Add predefined description options
            descriptions.add("Tegemeza_26");
            descriptions.add("ADA_26");
            descriptions.add("Dodoma_26");
            descriptions.add("Kwaya Record_26");

            let filterMonth = document.getElementById("filterMonth");
            filterMonth.innerHTML = '<option value="">Months</option>';
            Array.from(months).sort((a, b) => a - b).forEach(m => {
                filterMonth.innerHTML += `<option value="${m}">${m}</option>`;
            });

            let filterDate = document.getElementById("filterDate");
            filterDate.innerHTML = '<option value="">Dates</option>';
            Array.from(dates).sort().forEach(d => {
                filterDate.innerHTML += `<option value="${d}">${d}</option>`;
            });

            let filterUid = document.getElementById("filterUid");
            filterUid.innerHTML = '<option value="">UIDs</option>';
            Array.from(uids).sort().forEach(u => {
                filterUid.innerHTML += `<option value="${u}">${u}</option>`;
            });

            let filterName = document.getElementById("filterName");
            filterName.innerHTML = '<option value="">Names</option>';
            Array.from(names).sort().forEach(n => {
                filterName.innerHTML += `<option value="${n}">${n}</option>`;
            });

            let filterDescription = document.getElementById("filterDescription");
            filterDescription.innerHTML = '<option value="">Descriptions</option>';
            Array.from(descriptions).sort().forEach(desc => {
                filterDescription.innerHTML += `<option value="${desc}">${desc}</option>`;
            });

            let modalDescription = document.getElementById("description");
            modalDescription.innerHTML = '<option value="">Select Description</option>';
            Array.from(descriptions).sort().forEach(desc => {
                modalDescription.innerHTML += `<option value="${desc}">${desc}</option>`;
            });

            let filterAmount = document.getElementById("filterAmount");
            filterAmount.innerHTML = '<option value="">Amounts</option>';
            Array.from(amounts).map(a => Number(a)).sort((a, b) => a - b).forEach(a => {
                filterAmount.innerHTML += `<option value="${a}">${a.toLocaleString()}</option>`;
            });

            // Initialize Select2 after populating options
            initSelect2Filters();
            // Call filterTable to apply any pre-selected filters and update ppleCont
            filterTable(); // This will now render the table with proper SNs
        })
    }

    // Call promptForPasscode when the script loads
    // This will handle authentication and then call load()
    promptForPasscode();

    function parseDateForInput(dateText) {
        if (!dateText) return "";
        // Already dd-mm-yyyy form
        if (/^\d{2}-\d{2}-\d{4}$/.test(dateText)) return dateText;
        // Try to parse and convert to dd-mm-yyyy
        const d = new Date(dateText);
        if (!isNaN(d)) {
            let day = String(d.getDate()).padStart(2, '0');
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let year = d.getFullYear();
            return `${day}-${month}-${year}`;
        }
        return "";
    }

    function save() {
        // Only allow admins to save
        if (currentUserRole !== 'admin') {
            alert("You do not have permission to add transactions.");
            return;
        }

        let uid = document.getElementById("uid").value;
        let name = document.getElementById("name").value;
        let description = document.getElementById("description").value;
        let amount = document.getElementById("amount").value;
        let dateValue = document.getElementById("date").value;

        let date = dateValue || (() => {
            let d = new Date();
            let day = String(d.getDate()).padStart(2, '0');
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let year = d.getFullYear();
            return `${day}-${month}-${year}`;
        })();

        db.push({
            date,
            uid,
            name,
            description,
            amount
        }).then(() => {
            load();
        });

        clear();

        document.getElementById("updateBtn").classList.add("d-none");

        bootstrap.Modal.getInstance(document.getElementById('modal')).hide();
    }


    function edit(k) {
        // Only allow admins to edit
        if (currentUserRole !== 'admin') {
            alert("You do not have permission to edit transactions.");
            return;
        }

        db.child(k).once("value", snap => {
            let d = snap.val();

            document.getElementById("key").value = k;
            document.getElementById("uid").value = d.uid;
            document.getElementById("name").value = d.name;
            document.getElementById("description").value = d.description;
            document.getElementById("amount").value = d.amount;
            let parsedDate = parseDateForInput(d.date);

            // Set the value of the actual date input (which flatpickr hides)
            document.getElementById("date").value = parsedDate;

            // IMPORTANT: Tell the flatpickr instance to update its displayed date
            if (datePickerInstance) { // Ensure datePickerInstance exists
                datePickerInstance.setDate(parsedDate, true); // true as second argument updates the input field and triggers change event
            }


            document.getElementById("updateBtn").classList.remove("d-none");
            document.getElementById("saveBtn").classList.add("d-none");

            new bootstrap.Modal(document.getElementById('modal')).show();
        })
    }

    function update() {
        // Only allow admins to update
        if (currentUserRole !== 'admin') {
            alert("You do not have permission to update transactions.");
            return;
        }

        let k = document.getElementById("key").value;

        let date = document.getElementById("date").value || (() => {
            let d = new Date();
            let day = String(d.getDate()).padStart(2, '0');
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let year = d.getFullYear();
            return `${day}-${month}-${year}`;
        })();

        db.child(k).update({
            uid: document.getElementById("uid").value,
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            amount: document.getElementById("amount").value,
            date
        }).then(() => {
            load();
        });

        clear();

        bootstrap.Modal.getInstance(document.getElementById('modal')).hide();
    }

    function removeRow(k) {
        // Only allow admins to delete
        if (currentUserRole !== 'admin') {
            alert("You do not have permission to delete transactions.");
            return;
        }

        if (confirm("Delete record?")) {
            db.child(k).remove().then(() => {
                load();
            }).catch((err) => {
                console.error('Delete error:', err);
            });
        }
    }

    function clear() {
        // Clear function should be accessible to all to clear the form
        document.getElementById("uid").value = "";
        document.getElementById("name").value = "";
        document.getElementById("description").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("date").value = ""; // Clear the hidden input
        document.getElementById("key").value = "";

        // IMPORTANT: Tell the flatpickr instance to clear its displayed date
        if (datePickerInstance) { // Ensure datePickerInstance exists
            datePickerInstance.clear(true); // true to trigger change event
            datePickerInstance.setDate(new Date()); // Set back to default or empty if preferred
        }

        document.getElementById("updateBtn").classList.add("d-none");
        document.getElementById("saveBtn").classList.remove("d-none");
    }

    // Initialize flatpickr only once and assign to the global datePickerInstance variable
    // This resolves the "datePicker is declared two times" issue.
    datePickerInstance = flatpickr("#date", {
        dateFormat: "d-m-Y",
        defaultDate: new Date()
    });

    function filterTable() {
        let selectedMonth = document.getElementById("filterMonth").value;
        let selectedDate = document.getElementById("filterDate").value;
        let selectedUid = document.getElementById("filterUid").value;
        let selectedName = document.getElementById("filterName").value;
        let selectedDescription = document.getElementById("filterDescription").value;
        let selectedAmount = document.getElementById("filterAmount").value;

        let tbody = document.getElementById("tbody");
        let rows = Array.from(tbody.querySelectorAll("tr")); // Get current rows

        let filteredTotal = 0;
        let visibleRowCount = 0;
        let currentSN = 1; // Reset SN counter for filtered view

        // Clear existing rows to rebuild with correct SNs and visibility
        tbody.innerHTML = '';

        // Fetch the raw data again (or pass it from load if optimized)
        db.once("value", snap => {
            const allData = snap.val();
            if (!allData) return;

            const filteredData = Object.keys(allData)
                .map(key => ({ key, ...allData[key] }))
                .filter(r => {
                    let dateStr = r.date;
                    let parts = dateStr.split(/[-\/]/);
                    let monthNum;
                    if (parts.length === 3) {
                        if (parts[0].length === 4) { // assume YYYY-MM-DD
                            monthNum = parseInt(parts[1]);
                        } else { // assume DD-MM-YYYY
                            monthNum = parseInt(parts[1]);
                        }
                    } else {
                        let dateObj = new Date(dateStr);
                        monthNum = dateObj.getMonth() + 1;
                    }

                    let amountNum = Number(r.amount) || 0; // Ensure amount is numeric for comparison

                    return (!selectedMonth || String(monthNum) === selectedMonth) &&
                           (!selectedDate || r.date === selectedDate) &&
                           (!selectedUid || r.uid === selectedUid) &&
                           (!selectedName || r.name === selectedName) &&
                           (!selectedDescription || r.description === selectedDescription) &&
                           (!selectedAmount || String(amountNum) === selectedAmount);
                });

            filteredData.forEach(r => {
                let amountNum = Number(r.amount) || 0;
                filteredTotal += amountNum;
                visibleRowCount++;

                let dateStr = r.date;
                let parts = dateStr.split(/[-\/]/);
                let monthNum;
                if (parts.length === 3) {
                    if (parts[0].length === 4) { // assume YYYY-MM-DD
                        monthNum = parseInt(parts[1]);
                    } else { // assume DD-MM-YYYY
                        monthNum = parseInt(parts[1]);
                    }
                } else {
                    let dateObj = new Date(dateStr);
                    monthNum = dateObj.getMonth() + 1;
                }

                // Dynamically create buttons based on current user role
                let controlButtons = '';
                if (currentUserRole === 'admin') {
                    controlButtons = `
                        <button class="btn btn-sm btn-warning me-1" onclick="edit('${r.key}')">
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="removeRow('${r.key}')">
                            Delete
                        </button>
                    `;
                } else if (currentUserRole === 'guest') {
                    // Guests cannot edit or delete, so disabled buttons
                    controlButtons = `
                        <button class="btn btn-sm btn-warning me-1" disabled>
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" disabled>
                            Delete
                        </button>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${currentSN++}</td>
                        <td>${monthNum}</td>
                        <td>${r.date}</td>
                        <td>${r.uid}</td>
                        <td>${r.name}</td>
                        <td>${r.description}</td>
                        <td>${amountNum.toLocaleString()}</td>
                        <td class="table-control-cell">
                            ${controlButtons}
                        </td>
                    </tr>
                `;
            });

            document.getElementById("total").innerText = filteredTotal.toLocaleString();
            document.getElementById("ppleCont").innerText = visibleRowCount;
        });
    }


    document.getElementById("filterMonth").addEventListener("change", filterTable);
    document.getElementById("filterDate").addEventListener("change", filterTable);
    document.getElementById("filterUid").addEventListener("change", filterTable);
    document.getElementById("filterName").addEventListener("change", filterTable);
    document.getElementById("filterDescription").addEventListener("change", filterTable);
    document.getElementById("filterAmount").addEventListener("change", filterTable);
    document.getElementById("clearFilters").addEventListener("click", () => {
        document.getElementById("filterMonth").value = "";
        document.getElementById("filterDate").value = "";
        document.getElementById("filterUid").value = "";
        document.getElementById("filterName").value = "";
        document.getElementById("filterDescription").value = "";
        document.getElementById("filterAmount").value = "";
        // Also reset Select2 visual state
        $('#filterMonth, #filterDate, #filterUid, #filterName, #filterDescription, #filterAmount').val('').trigger('change');
        // No need to call filterTable here, the 'change' trigger from .val('').trigger('change') will call it.
    });
</script>
