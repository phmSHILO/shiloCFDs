<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matoleo Yangu Portal</title>
    <style>
        :root {
            --primary-color: #1a3a5a;
            --accent-red: #d9534f;
            --accent-green: #28a745;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 5px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            --bg-color: #121212;
            --primary-color: #bb86fc;
            background-color: #121212;
            color: #e0e0e0;
        }

        .report-container {
            background-color: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        body.dark-mode .report-container { background-color: #1e1e1e; color: #e0e0e0; }

        /* Fixed Toggle - No overlap */
        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(16px); }

        .portal-header { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .portal-header h1 { margin: 0; font-size: 1.1rem; color: var(--primary-color); text-transform: uppercase; }
        
        .search-btn {
            width: 100%; max-width: 250px; margin: 15px 0;
            background-color: var(--primary-color); color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .info-section { 
            margin-bottom: 15px; border: 1px solid #f0f0f0; padding: 12px; 
            border-radius: 8px; background-color: #fafafa; text-align: left;
        }
        body.dark-mode .info-section { background-color: #2c2c2c; border-color: #444; }

        .info-row { display: flex; margin-bottom: 8px; font-size: 0.9rem; }
        .label { width: 60px; font-weight: bold; color: #555; }
        .value { border-bottom: 1px solid #eee; flex: 1; padding-left: 8px; font-weight: 600; color: var(--primary-color); }
        .uid-hidden { filter: blur(5px); user-select: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px 5px; font-size: 0.8rem; text-align: center; }
        th { background-color: #f8f9fa; color: var(--primary-color); }
        body.dark-mode th { background-color: #333; color: #bb86fc; border-color: #444; }

        .col-uli-val { color: var(--accent-green) !important; font-weight: 600; }
        .col-deni-val { color: var(--accent-red) !important; font-weight: 600; }

        /* Moderate Total Row size */
        .total-row td { 
            font-weight: 800 !important; 
            font-size: 0.95rem !important; 
            color: var(--primary-color); 
            background-color: #f0f4f8;
            padding: 12px 5px !important;
        }
        body.dark-mode .total-row td { background-color: #2c2c2c; color: #bb86fc; }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="theme-toggle">
            <span>🌙 Mode</span>
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="portal-header">
            <h1>MATOLEO YANGU PORTAL</h1>
            <h2>phm shilo (CFDs)</h2>
        </div>

        <button class="search-btn" onclick="toggleModal(true)">Ingiza UID / Tafuta</button>

        <div class="info-section">
            <div class="info-row"><span class="label">JINA:</span> <span id="display-name" class="value">---</span></div>
            <div class="info-row">
                <span class="label">UID:</span> 
                <span id="display-uid" class="value uid-hidden">---</span>
                <span id="interface-uid-toggle" style="cursor:pointer; margin-left:10px;">👁️</span>
            </div>
        </div>

        <table>
            <thead><tr><th>SN</th><th style="text-align:left; padding-left:10px;">MCHANGO</th><th>AHADI</th><th>UMETOA</th><th>DENI</th></tr></thead>
            <tbody>
                <tr><td>1</td><td style="text-align:left; padding-left:10px;">ADA_26</td><td id="ahadi-ada">0</td><td id="uli-ada" class="col-uli-val">0</td><td id="deni-ada" class="col-deni-val">0</td></tr>
                <tr><td>2</td><td style="text-align:left; padding-left:10px;">TEGEMEZA_26</td><td id="ahadi-tegemeza">0</td><td id="uli-tegemeza" class="col-uli-val">0</td><td id="deni-tegemeza" class="col-deni-val">0</td></tr>
                <tr><td>3</td><td style="text-align:left; padding-left:10px;">Semina Dodoma</td><td id="ahadi-dodoma">0</td><td id="uli-dodoma" class="col-uli-val">0</td><td id="deni-dodoma" class="col-deni-val">0</td></tr>
                <tr><td>4</td><td style="text-align:left; padding-left:10px;">Mahongo [mtoto]</td><td id="ahadi-upendo">0</td><td id="uli-upendo" class="col-uli-val">0</td><td id="deni-upendo" class="col-deni-val">0</td></tr>
                <tr><td>5</td><td style="text-align:left; padding-left:10px;">Joyce [msiba]</td><td id="ahadi-joyce">0</td><td id="uli-joyce" class="col-uli-val">0</td><td id="deni-joyce" class="col-deni-val">0</td></tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="2" style="text-align:right">JUMLA:</td>
                    <td id="total-ahadi">0</td><td id="total-uli" class="col-uli-val">0</td><td id="total-deni" class="col-deni-val">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div id="uid-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background:white; padding:20px; border-radius:12px; width:90%; max-width:320px;">
            <h3 style="color:#1a3a5a; margin-top:0;">Ingiza UID Yako</h3>
            <input type="text" id="modal-uid-input" style="width:100%; padding:10px; margin-bottom:15px;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="toggleModal(false)">Ghairi</button>
                <button id="modal-submit-btn" style="background:#1a3a5a; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Tafuta</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCQCteNpcwUdpWizwzP8WuyDsyeTr-Wabk",
          authDomain: "vacantt-1.firebaseapp.com",
          databaseURL: "https://vacantt-1-default-rtdb.firebaseio.com",
          projectId: "vacantt-1",
          storageBucket: "vacantt-1.firebasestorage.app",
          messagingSenderId: "484618102811",
          appId: "1:484618102811:web:84b701f47c601ee07af0be"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleModal(show) { document.getElementById('uid-modal').style.display = show ? 'flex' : 'none'; if(show) setTimeout(() => document.getElementById('modal-uid-input').focus(), 100); }
        document.getElementById('modal-uid-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('modal-submit-btn').click(); });
        document.getElementById('dark-mode-toggle').addEventListener('change', (e) => { document.body.classList.toggle('dark-mode', e.target.checked); });
        document.getElementById('interface-uid-toggle').addEventListener('click', () => { document.getElementById('display-uid').classList.toggle('uid-hidden'); });
        document.getElementById('modal-submit-btn').addEventListener('click', () => { const val = document.getElementById('modal-uid-input').value.trim(); if(val) { fetchAllData(val); toggleModal(false); } });

        async function fetchAllData(targetUid) {
            const ids = ['uli-ada', 'deni-ada', 'ahadi-tegemeza', 'uli-tegemeza', 'deni-tegemeza', 'ahadi-joyce', 'uli-joyce', 'deni-joyce', 'ahadi-dodoma', 'uli-dodoma', 'deni-dodoma', 'ahadi-upendo', 'uli-upendo', 'deni-upendo', 'total-ahadi', 'total-uli', 'total-deni', 'ahadi-ada'];
            ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = "0"; });
            try {
                const get = (p) => db.ref(p).orderByChild('uid').equalTo(targetUid).once('value');
                const [memberSnap, a, b, c, d, e] = await Promise.all([
                    db.ref('memberIDs').orderByChild('uid').equalTo(targetUid).once('value'),
                    get('Ada_CFDs_26'), get('SeminaDodoma_26'), get('Tegemeza_CFDs_26'), get('Upendo_Mahongo_26'), get('Upendo_Joyce_26')
                ]);
                if (!memberSnap.exists() && !a.exists()) { alert("UID haijapatikana."); return; }
                document.getElementById('display-uid').innerText = targetUid;
                if (memberSnap.exists()) { document.getElementById('display-name').innerText = Object.values(memberSnap.val())[0].fullName || "---"; }

                let sumAhadi = 0, sumUli = 0;
                let adaUli = 0;
                if (a.exists()) Object.values(a.val()).forEach(r => { if (r.contributions) Object.values(r.contributions).forEach(v => adaUli += parseFloat(v) || 0); else if (r.amount) adaUli += parseFloat(r.amount) || 0; });
                document.getElementById('ahadi-ada').innerText = "12,000";
                document.getElementById('uli-ada').innerText = adaUli.toLocaleString();
                document.getElementById('deni-ada').innerText = Math.max(0, 12000 - adaUli).toLocaleString();
                sumAhadi += 12000; sumUli += adaUli;

                const proc = (snap, id) => { let h = 0, u = 0; if (snap.exists()) Object.values(snap.val()).forEach(r => { h += parseFloat(r.amount) || 0; u += parseFloat(r.reducedAmount) || 0; }); document.getElementById(`ahadi-${id}`).innerText = h.toLocaleString(); document.getElementById(`uli-${id}`).innerText = u.toLocaleString(); document.getElementById(`deni-${id}`).innerText = Math.max(0, h-u).toLocaleString(); sumAhadi += h; sumUli += u; };
                proc(c, 'tegemeza'); proc(b, 'dodoma');

                const procUpendo = (snap, id) => { let u = 0; if (snap.exists()) Object.values(snap.val()).forEach(r => u += parseFloat(r.amount) || 0); document.getElementById(`ahadi-${id}`).innerText = u.toLocaleString(); document.getElementById(`uli-${id}`).innerText = u.toLocaleString(); document.getElementById(`deni-${id}`).innerText = "0"; sumAhadi += u; sumUli += u; };
                procUpendo(d, 'upendo'); procUpendo(e, 'joyce');

                document.getElementById('total-ahadi').innerText = sumAhadi.toLocaleString();
                document.getElementById('total-uli').innerText = sumUli.toLocaleString();
                document.getElementById('total-deni').innerText = Math.max(0, sumAhadi - sumUli).toLocaleString();
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
