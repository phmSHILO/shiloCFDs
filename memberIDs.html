<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Member Manager Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --border-color: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--primary-bg); 
            margin: 0; 
            color: var(--text-main);
            line-height: 1.5;
        }

        .app-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            min-height: 100vh;
            padding: 24px;
        }

        /* Fixed Sticky Header */
        .sticky-header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 3px solid #f1f5f9;
            margin-bottom: 24px;
        }

        .header-actions { display: flex; gap: 14px; }
        .header-actions .btn { 
            flex: 1; padding: 14px; font-weight: 700; border-radius: 12px; 
            text-transform: uppercase; font-size: 15px; border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Professional Table Styling */
        table { width: 100%; border-collapse: collapse; }
        th { 
            color: var(--text-muted); font-size: 13px; text-transform: uppercase; 
            padding: 14px 12px; border-bottom: 2px solid var(--border-color);
            font-weight: 800; letter-spacing: 0.05em;
        }

        td { padding: 20px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .col-sn { width: 50px; text-align: left; color: var(--text-muted); font-weight: 600; font-size: 16px; }
        
        /* 1. INCREASED NAME SIZE */
        .col-name { 
            font-size: 18px; /* Larger and clearer */
            font-weight: 700; 
            color: #000; 
            letter-spacing: -0.01em;
        }
        
        /* 2. INCREASED UID SIZE & VISIBILITY */
        .col-uid { width: 140px; }
        .uid-pill {
            background-color: #f1f5f9;
            color: #334155;
            padding: 6px 10px;
            border-radius: 8px;
           
            font-size: 15px; /* Bumped from 13px to 15px */
            font-weight: 700;
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        .col-actions { width: 140px; text-align: right; }

        .btn-group { display: flex; gap: 8px; justify-content: flex-end; }
        .action-btn { 
            padding: 8px 16px; font-size: 14px; font-weight: 700; 
            border-radius: 8px; border: none;
        }

        .edit-btn { background-color: #ffc107; color: #000; } 
        .delete-btn { background-color: #ef4444; color: #fff; }

        #registerInterface, #searchInterface { 
            display: none; background: #f8fafc; padding: 24px; border-radius: 16px; 
            margin-bottom: 24px; border: 1px solid var(--border-color);
        }
        input.form-control { padding: 14px; border-radius: 10px; border: 1px solid #94a3b8; font-size: 16px; margin-bottom: 12px; }

        @media (max-width: 600px) {
            .app-container { padding: 12px; }
            th.col-uid, td.col-uid { display: none; }
            .mobile-uid-row { display: block; margin-top: 6px; }
            .col-name { font-size: 16px; }
            td { padding: 16px 10px; }
        }
        @media (min-width: 601px) { .mobile-uid-row { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sticky-header">
        <div class="header-actions">
            <button class="btn btn-primary" onclick="toggleSearch()">Find Member</button>
            <button class="btn btn-success" onclick="toggleRegister()">Register New</button>
        </div>
    </div>

    <div id="searchInterface">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name..." onkeyup="searchMember()">
    </div>

    <div id="registerInterface">
        <input type="text" id="fullName" class="form-control" placeholder="Member Full Name">
        <input type="text" id="uid" class="form-control" placeholder="Member UID">
        <button id="saveBtn" class="btn btn-success w-100">Add to Database</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-sn">#</th>
                    <th class="col-name">Name</th>
                    <th class="col-uid">UID</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQCteNpcwUdpWizwzP8WuyDsyeTr-Wabk",
        authDomain: "vacantt-1.firebaseapp.com",
        databaseURL: "https://vacantt-1-default-rtdb.firebaseio.com",
        projectId: "vacantt-1",
        storageBucket: "vacantt-1.firebasestorage.app",
        messagingSenderId: "484618102811",
        appId: "1:484618102811:web:84b701f47c601ee07af0be"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const membersRef = database.ref('memberIDs');

    membersRef.on('value', (snapshot) => {
        const tableBody = document.getElementById('memberTableBody');
        tableBody.innerHTML = '';
        let sn = 1;
        snapshot.forEach((child) => {
            const key = child.key;
            const data = child.val();
            const safeName = data.fullName.replace(/'/g, "\\'");

            tableBody.innerHTML += `
                <tr>
                    <td class="col-sn">${sn++}</td>
                    <td class="col-name">
                        <div>${data.fullName}</div>
                        <div class="mobile-uid-row"><span class="uid-pill">${data.uid}</span></div>
                    </td>
                    <td class="col-uid"><span class="uid-pill">${data.uid}</span></td>
                    <td class="col-actions">
                        <div class="btn-group">
                            <button class="action-btn edit-btn" onclick="editMember('${key}','${safeName}','${data.uid}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteMember('${key}', '${safeName}')">Del</button>
                        </div>
                    </td>
                </tr>`;
        });
        searchMember();
    });

    function deleteMember(id, name) { 
        if(confirm(`Delete ${name}?`)) membersRef.child(id).remove();
    }
    
    function editMember(id, n, u) {
        const newN = prompt("New Name:", n);
        const newU = prompt("New UID:", u);
        if(newN && newU) membersRef.child(id).update({fullName: newN, uid: newU});
    }

    function toggleRegister() {
        document.getElementById('searchInterface').style.display = 'none';
        const ui = document.getElementById('registerInterface');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
    }

    function toggleSearch() {
        document.getElementById('registerInterface').style.display = 'none';
        const ui = document.getElementById('searchInterface');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
    }

    function searchMember() {
        const filter = document.getElementById('searchInput').value.toUpperCase();
        const tr = document.getElementById('memberTableBody').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            const td = tr[i].getElementsByTagName('td')[1];
            if (td) tr[i].style.display = (td.textContent.toUpperCase().includes(filter)) ? "" : "none";
        }
    }

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('fullName').value;
        const id = document.getElementById('uid').value;
        if(name && id) membersRef.push({fullName:name, uid:id}).then(() => {
            document.getElementById('fullName').value=''; 
            document.getElementById('uid').value=''; 
            toggleRegister();
        });
    };
</script>
</body>
</html>
