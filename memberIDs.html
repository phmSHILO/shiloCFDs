<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Management</title>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --border-color: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #475569;
            --warning-bg: #fee2e2;
            --warning-text: #b91c1c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--primary-bg); 
            margin: 0; 
            color: var(--text-main);
            line-height: 1.5;
        }

        .app-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            min-height: 100vh;
            padding: 24px;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 3px solid #f1f5f9;
            margin-bottom: 24px;
        }

        .header-actions { display: flex; gap: 14px; }
        .header-actions .btn { 
            flex: 1; padding: 14px; font-weight: 700; border-radius: 12px; 
            text-transform: uppercase; font-size: 15px; border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-success { background-color: #10b981; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { 
            color: var(--text-muted); font-size: 13px; text-transform: uppercase; 
            padding: 14px 12px; border-bottom: 2px solid var(--border-color);
            font-weight: 800; letter-spacing: 0.05em;
            text-align: left;
        }

        td { padding: 20px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        tr.is-duplicate { background-color: var(--warning-bg); }
        tr.is-duplicate .col-name { color: var(--warning-text); }

        .col-sn { width: 50px; color: var(--text-muted); font-weight: 600; font-size: 16px; }
        .col-name { font-size: 18px; font-weight: 700; color: #000; }
        .col-uid { width: 120px; }
        .col-phone { width: 140px; }
        
        .uid-pill, .phone-pill {
            background-color: #f1f5f9;
            color: #334155;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        .col-actions { width: 140px; text-align: right; }
        .btn-group { display: flex; gap: 8px; justify-content: flex-end; }
        .action-btn { padding: 8px 16px; font-size: 14px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; }
        .edit-btn { background-color: #ffc107; color: #000; } 
        .delete-btn { background-color: #ef4444; color: #fff; }

        #registerInterface, #searchInterface { 
            display: none; background: #f8fafc; padding: 24px; border-radius: 16px; 
            margin-bottom: 24px; border: 1px solid var(--border-color);
        }
        .form-control { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #94a3b8; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .form-control:focus { border-color: #3b82f6; }
        .w-100 { width: 100%; }

        @media (max-width: 600px) {
            .app-container { padding: 12px; }
            th.col-uid, td.col-uid, th.col-phone, td.col-phone { display: none; }
            .mobile-info-row { display: block; margin-top: 6px; font-size: 13px; color: var(--text-muted); }
            .col-name { font-size: 16px; }
        }
        @media (min-width: 601px) { .mobile-info-row { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sticky-header">
        <div class="header-actions">
            <button class="btn btn-primary" onclick="toggleSearch()">Find Member</button>
            <button class="btn btn-success" onclick="toggleRegister()">Register New</button>
        </div>
    </div>

    <div id="searchInterface">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name..." onkeyup="searchMember()">
    </div>

    <div id="registerInterface">
        <input type="text" id="fullName" class="form-control" placeholder="Member Full Name" onkeyup="checkDuplicateInRegistration()">
        <input type="text" id="uid" class="form-control" placeholder="Member UID">
        <input type="text" id="phone" class="form-control" placeholder="Phone Number">
        <button id="saveBtn" class="btn btn-success w-100">Add to Database</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-sn">#</th>
                    <th class="col-name">Name</th>
                    <th class="col-uid">UID</th>
                    <th class="col-phone">Phone</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQCteNpcwUdpWizwzP8WuyDsyeTr-Wabk",
        authDomain: "vacantt-1.firebaseapp.com",
        databaseURL: "https://vacantt-1-default-rtdb.firebaseio.com",
        projectId: "vacantt-1",
        storageBucket: "vacantt-1.firebasestorage.app",
        messagingSenderId: "484618102811",
        appId: "1:484618102811:web:84b701f47c601ee07af0be"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const membersRef = database.ref('memberIDs');

    membersRef.on('value', (snapshot) => {
        const tableBody = document.getElementById('memberTableBody');
        tableBody.innerHTML = '';
        let sn = 1;
        snapshot.forEach((child) => {
            const key = child.key;
            const data = child.val();
            const safeName = data.fullName ? data.fullName.replace(/'/g, "\\'") : "Unknown";
            const phone = data.phone || 'N/A';

            tableBody.innerHTML += `
                <tr data-name="${data.fullName.toUpperCase()}">
                    <td class="col-sn">${sn++}</td>
                    <td class="col-name">
                        <div class="name-val">${data.fullName}</div>
                        <!-- Only visible on small mobile screens -->
                        <div class="mobile-info-row">
                            <span class="uid-pill">${data.uid}</span>
                            <span class="phone-pill">${phone}</span>
                        </div>
                    </td>
                    <td class="col-uid"><span class="uid-pill">${data.uid}</span></td>
                    <td class="col-phone"><span class="phone-pill">${phone}</span></td>
                    <td class="col-actions">
                        <div class="btn-group">
                            <button class="action-btn edit-btn" onclick="editMember('${key}','${safeName}','${data.uid}','${phone}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteMember('${key}', '${safeName}')">Del</button>
                        </div>
                    </td>
                </tr>`;
        });
        checkAllDuplicates();
        searchMember();
    });

    function checkAllDuplicates() {
        const rows = document.querySelectorAll('#memberTableBody tr');
        const nameCounts = {};
        rows.forEach(row => {
            const name = row.getAttribute('data-name');
            nameCounts[name] = (nameCounts[name] || 0) + 1;
        });
        rows.forEach(row => {
            const name = row.getAttribute('data-name');
            if (nameCounts[name] > 1) {
                row.classList.add('is-duplicate');
            } else {
                row.classList.remove('is-duplicate');
            }
        });
    }

    function checkDuplicateInRegistration() {
        const input = document.getElementById('fullName');
        const currentVal = input.value.trim().toUpperCase();
        const rows = document.querySelectorAll('#memberTableBody tr');
        let found = false;

        rows.forEach(row => {
            const rowName = row.getAttribute('data-name');
            if (currentVal !== "" && rowName === currentVal) {
                row.classList.add('is-duplicate');
                found = true;
            } else {
                checkAllDuplicates(); 
            }
        });

        input.style.borderColor = found ? 'var(--warning-text)' : '#94a3b8';
    }

    function toggleRegister() {
        document.getElementById('searchInterface').style.display = 'none';
        const ui = document.getElementById('registerInterface');
        const isOpening = ui.style.display !== 'block';
        ui.style.display = isOpening ? 'block' : 'none';
        if(isOpening) document.getElementById('fullName').focus();
    }

    function toggleSearch() {
        document.getElementById('registerInterface').style.display = 'none';
        const ui = document.getElementById('searchInterface');
        const isOpening = ui.style.display !== 'block';
        ui.style.display = isOpening ? 'block' : 'none';
        if(isOpening) document.getElementById('searchInput').focus();
    }

    document.getElementById('registerInterface').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('saveBtn').click();
    });

    function deleteMember(id, name) { 
        if(confirm(`Delete ${name}?`)) membersRef.child(id).remove();
    }
    
    function editMember(id, n, u, p) {
        const newN = prompt("New Name:", n);
        const newU = prompt("New UID:", u);
        const newP = prompt("New Phone:", p);
        if(newN && newU && newP) {
            membersRef.child(id).update({ fullName: newN, uid: newU, phone: newP });
        }
    }

    function searchMember() {
        const filter = document.getElementById('searchInput').value.toUpperCase();
        const tr = document.getElementById('memberTableBody').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            const td = tr[i].getElementsByTagName('td')[1];
            if (td) tr[i].style.display = (td.textContent.toUpperCase().includes(filter)) ? "" : "none";
        }
    }

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('fullName').value;
        const id = document.getElementById('uid').value;
        const phone = document.getElementById('phone').value;
        
        if(name && id && phone) {
            membersRef.push({ fullName: name, uid: id, phone: phone }).then(() => {
                document.getElementById('fullName').value = ''; 
                document.getElementById('uid').value = ''; 
                document.getElementById('phone').value = ''; 
                toggleRegister();
            });
        } else {
            alert("Please fill in all fields (Name, UID, and Phone)");
        }
    };
</script>

</body>
</html>
