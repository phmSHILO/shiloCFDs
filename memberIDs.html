<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Member Manager with Named Delete</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 5px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 100%; margin: auto; background: white; padding: 8px; border-radius: 8px; }
        .header-actions { display: flex; gap: 5px; margin-bottom: 12px; }
        button { flex: 1; padding: 10px 2px; border: none; border-radius: 4px; font-weight: 600; font-size: 12px; cursor: pointer; }
        #findBtn { background-color: #1a73e8; color: white; }
        #showRegisterBtn { background-color: #34a853; color: white; }
        .table-wrapper { width: 100%; overflow-x: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border-bottom: 1px solid #eee; padding: 8px 2px; text-align: left; font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
        .col-sn { width: 25px; text-align: center; }
        .col-uid { width: 70px; color: #666; }
        .col-actions { width: 85px; white-space: nowrap; }
        th { background-color: #f8f9fa; color: #555; font-size: 10px; text-transform: uppercase; }
        .btn-group { display: flex; flex-direction: row; gap: 4px; }
        .action-btn { flex: none; width: 38px; padding: 5px 0; font-size: 10px; border-radius: 3px; }
        .edit-btn { background-color: #fbbc04; color: #000; }
        .delete-btn { background-color: #ea4335; color: #fff; }
        #registerInterface, #searchInterface { display: none; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <button id="findBtn" onclick="toggleSearch()">FIND</button>
        <button id="showRegisterBtn" onclick="toggleRegister()">REGISTER</button>
    </div>

    <div id="searchInterface">
        <input type="text" id="searchInput" placeholder="Search name..." onkeyup="searchMember()">
        <button onclick="clearSearch()" style="background:#607d8b; color:white; width:100%;">Clear</button>
    </div>

    <div id="registerInterface">
        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="uid" placeholder="UID">
        <button id="saveBtn" style="background:#34a853; color:white; width:100%;">Save</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-sn">#</th>
                    <th>Name</th>
                    <th class="col-uid">UID</th>
                    <th class="col-actions">Act</th>
                </tr>
            </thead>
            <tbody id="memberTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQCteNpcwUdpWizwzP8WuyDsyeTr-Wabk",
        authDomain: "vacantt-1.firebaseapp.com",
        databaseURL: "https://vacantt-1-default-rtdb.firebaseio.com",
        projectId: "vacantt-1",
        storageBucket: "vacantt-1.firebasestorage.app",
        messagingSenderId: "484618102811",
        appId: "1:484618102811:web:84b701f47c601ee07af0be"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const membersRef = database.ref('memberIDs');

    membersRef.on('value', (snapshot) => {
        const tableBody = document.getElementById('memberTableBody');
        tableBody.innerHTML = '';
        let sn = 1;
        snapshot.forEach((child) => {
            const key = child.key;
            const data = child.val();
            
            // Escape quotes in name to prevent breaking the HTML string
            const safeName = data.fullName.replace(/'/g, "\\'");

            tableBody.innerHTML += `
                <tr>
                    <td class="col-sn">${sn++}</td>
                    <td style="font-weight:500">${data.fullName}</td>
                    <td class="col-uid">${data.uid}</td>
                    <td class="col-actions">
                        <div class="btn-group">
                            <button class="action-btn edit-btn" onclick="editMember('${key}','${safeName}','${data.uid}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteMember('${key}', '${safeName}')">Del</button>
                        </div>
                    </td>
                </tr>`;
        });
        searchMember();
    });

    // UPDATED DELETE FUNCTION
    function deleteMember(id, name) { 
        if(confirm(`Do you want to delete ${name}?`)) {
            membersRef.child(id).remove();
        } 
    }
    
    function editMember(id, n, u) {
        const newN = prompt("New Name:", n);
        const newU = prompt("New UID:", u);
        if(newN && newU) membersRef.child(id).update({fullName: newN, uid: newU});
    }

    function toggleRegister() {
        document.getElementById('searchInterface').style.display = 'none';
        const ui = document.getElementById('registerInterface');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
    }

    function toggleSearch() {
        document.getElementById('registerInterface').style.display = 'none';
        const ui = document.getElementById('searchInterface');
        ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
    }

    function searchMember() {
        const filter = document.getElementById('searchInput').value.toUpperCase();
        const tr = document.getElementById('memberTableBody').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            const td = tr[i].getElementsByTagName('td')[1];
            if (td) tr[i].style.display = (td.textContent.toUpperCase().includes(filter)) ? "" : "none";
        }
    }

    function clearSearch() { document.getElementById('searchInput').value = ''; searchMember(); }

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('fullName').value;
        const id = document.getElementById('uid').value;
        if(name && id) membersRef.push({fullName:name, uid:id}).then(() => {
            document.getElementById('fullName').value=''; 
            document.getElementById('uid').value=''; 
            toggleRegister();
        });
    };
</script>
</body>
</html>
