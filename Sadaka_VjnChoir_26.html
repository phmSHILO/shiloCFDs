    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQCteNpcwUdpWizwzP8WuyDsyeTr-Wabk",
            authDomain: "vacantt-1.firebaseapp.com",
            databaseURL: "https://vacantt-1-default-rtdb.firebaseio.com",
            projectId: "vacantt-1",
            storageBucket: "vacantt-1.appspot.com",
            messagingSenderId: "484618102811",
            appId: "1:484618102811:web:84b701f47c601ee07af0be"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        console.log('Firebase initialized, database ready', database);

        const db = database.ref("Sadaka_VjnChoir_26");
        const usersDb = database.ref("Users"); // Reference to your Users node

        let datePickerInstance;
        let currentUserRole = null;
        let allTransactionsData = []; // Global variable to store all fetched data

        // Function to show/hide elements based on role
        function applyRoleRestrictions(role) {
            const addTransactionButton = document.querySelector('.btn.btn-primary.ms-auto');
            if (role === 'guest') {
                if (addTransactionButton) {
                    addTransactionButton.style.display = 'none';
                }
            } else if (role === 'admin') {
                if (addTransactionButton) {
                    addTransactionButton.style.display = ''; // Show for admin
                }
            }
            // Edit/Delete buttons dynamically handled in filterTable based on role
        }

        // Passcode prompt function
        async function promptForPasscode() {
            let passcode = null;
            let adminPasscode = null;
            let guestPasscode = null;

            await usersDb.once("value", snap => {
                const usersData = snap.val();
                if (usersData) {
                    adminPasscode = usersData.Admin;
                    guestPasscode = usersData.Guest;
                }
            });

            while (true) {
                passcode = prompt("Please enter your passcode:");
                if (passcode === null) {
                    alert("Passcode is required to access the application.");
                    continue;
                }

                if (passcode === String(adminPasscode)) {
                    currentUserRole = 'admin';
                    alert("Welcome Admin!");
                    break;
                } else if (passcode === String(guestPasscode)) {
                    currentUserRole = 'guest';
                    alert("Welcome Guest!");
                    break;
                } else {
                    alert("Invalid passcode. Please try again.");
                }
            }
            // Once authenticated, load the data and apply restrictions
            load();
            applyRoleRestrictions(currentUserRole);
        }

        // MODIFIED: Helper to initialize Select2 with custom placeholders per filter
        function initSelect2Filters() {
            // Destroy existing instances to avoid duplication
            $('.select2-hidden-accessible').each(function() {
                $(this).select2('destroy');
            });

            const placeholders = {
                filterMonth: " Month...",
                filterDate: " Date...",
                filterUid: " UID...",
                filterName: " Name...",
                filterDescription: " Description...",
                filterAmount: " Amount..."
            };

            for (let id in placeholders) {
                const element = $(`#${id}`);
                element.select2({
                    theme: 'bootstrap-5',
                    width: '100%',
                    placeholder: placeholders[id],
                    allowClear: false,
                    // Ensure dropdownParent correctly targets an existing element
                    dropdownParent: $('.d-flex.align-items-end.mb-3')[0] || document.body // Fallback to body
                });
            }

            // Reattach filter event after Select2 change
            $('#filterMonth, #filterDate, #filterUid, #filterName, #filterDescription, #filterAmount').off('change').on('change', function() {
                filterTable();
            });
        }

        // NEW FUNCTION: Handles populating filters and then rendering the table
               function renderTableAndFilters(dataArray) {
            let months = new Set();
            let dates = new Set();
            let uids = new Set();
            let names = new Set();
            // Create two sets for descriptions: one for filters, one for the modal
            let filterDescriptions = new Set();
            let allModalDescriptions = new Set(); // For the modal, including predefined

            let amounts = new Set();

            dataArray.forEach(r => {
                let dateStr = r.date;
                let parts = dateStr.split(/[-\/]/);
                let monthNum;
                if (parts.length === 3) {
                    if (parts[0].length === 4) { // assume YYYY-MM-DD
                        monthNum = parseInt(parts[1]);
                    } else { // assume DD-MM-YYYY
                        monthNum = parseInt(parts[1]);
                    }
                } else {
                    let dateObj = new Date(dateStr);
                    monthNum = dateObj.getMonth() + 1;
                }
                months.add(monthNum);
                dates.add(r.date);
                uids.add(r.uid);
                names.add(r.name);
                filterDescriptions.add(r.description); // Add to filter set
                allModalDescriptions.add(r.description); // Add to modal set
                amounts.add(r.amount);
            });

            // Add predefined description options ONLY to the modal's description set
            allModalDescriptions.add("Tegemeza_26");
            allModalDescriptions.add("ADA_26");
            allModalDescriptions.add("Dodoma_26");
            allModalDescriptions.add("Kwaya Record_26");
            allModalDescriptions.add("Sadaka kwayaVjn_26");
            allModalDescriptions.add("Sadaka Mkesha_26");


            const filterElements = {
                filterMonth: { set: months, placeholder: "All Months" },
                filterDate: { set: dates, placeholder: "All Dates" },
                filterUid: { set: uids, placeholder: "All UIDs" },
                filterName: { set: names, placeholder: "All Names" },
                // Use filterDescriptions for the description filter
                filterDescription: { set: filterDescriptions, placeholder: "All Descriptions" },
                filterAmount: { set: amounts, placeholder: "All Amounts" }
            };

            // Populate filter dropdowns and preserve current selections
            for (const id in filterElements) {
                const element = document.getElementById(id);
                const currentSelection = element.value;
                element.innerHTML = `<option value="">${filterElements[id].placeholder}</option>`;
                const sortedValues = Array.from(filterElements[id].set).sort((a, b) => {
                    // Custom sort for amounts to handle numbers, default for others
                    if (id === 'filterAmount') {
                        return Number(a) - Number(b);
                    }
                    return String(a).localeCompare(String(b));
                });
                sortedValues.forEach(val => {
                    element.innerHTML += `<option value="${val}">${id === 'filterAmount' ? Number(val).toLocaleString() : val}</option>`;
                });
                element.value = currentSelection; // Restore selection
            }

            // Populate modalDescription separately with allModalDescriptions
            let modalDescription = document.getElementById("description");
            // Ensure modalDescription exists before trying to access its value
            if (modalDescription) {
                const currentModalDescriptionValue = modalDescription.value;
                modalDescription.innerHTML = '<option value="">Select Description</option>';
                Array.from(allModalDescriptions).sort().forEach(desc => {
                    modalDescription.innerHTML += `<option value="${desc}">${desc}</option>`;
                });
                modalDescription.value = currentModalDescriptionValue; // Restore selection
            }

            // Initialize Select2 after populating options (this also refreshes them)
            initSelect2Filters();
            // Call filterTable to render the table based on current filters and the stored data
            filterTable();
        }

        // MODIFIED: `load` function to fetch data once and then render using the new `renderTableAndFilters`
        function load() {
            db.on("value", snap => {
                const data = snap.val();
                if (data) {
                    allTransactionsData = Object.keys(data).map(key => ({
                        key,
                        ...data[key]
                    }));
                } else {
                    allTransactionsData = [];
                }
                renderTableAndFilters(allTransactionsData); // Use the new function to handle filters and table rendering
            });
        }

        // Call promptForPasscode when the script loads
        // This will handle authentication and then call load()
        // Wrapped in DOMContentLoaded to ensure promptForPasscode isn't called before DOM is fully ready
        document.addEventListener('DOMContentLoaded', promptForPasscode);


        function parseDateForInput(dateText) {
            if (!dateText) return "";
            if (/^\d{2}-\d{2}-\d{4}$/.test(dateText)) return dateText; // Already dd-mm-yyyy form
            const d = new Date(dateText);
            if (!isNaN(d.getTime())) { // Check for valid date
                let day = String(d.getDate()).padStart(2, '0');
                let month = String(d.getMonth() + 1).padStart(2, '0');
                let year = d.getFullYear();
                return `${day}-${month}-${year}`;
            }
            return "";
        }

        // MODIFIED: `save` function to remove redundant `load()` call and properly close modal
        function save() {
            if (currentUserRole !== 'admin') {
                alert("You do not have permission to add transactions.");
                return;
            }

            let uid = document.getElementById("uid").value;
            let name = document.getElementById("name").value;
            let description = document.getElementById("description").value;
            let amount = document.getElementById("amount").value;
            let dateValue = document.getElementById("date").value;

            let date = dateValue || (() => {
                let d = new Date();
                let day = String(d.getDate()).padStart(2, '0');
                let month = String(d.getMonth() + 1).padStart(2, '0');
                let year = d.getFullYear();
                return `${day}-${month}-${year}`;
            })();

            db.push({
                date,
                uid,
                name,
                description,
                amount
            }).then(() => {
                // The `db.on("value")` listener in `load()` will automatically re-render the table.
                // No explicit `load()` call needed here.
            });

            clear();
            document.getElementById("updateBtn").classList.add("d-none");
            $('#modal').modal('hide'); // Proper way to close Bootstrap modal
        }


        // MODIFIED: `edit` function logic for updating the modal and flatpickr
        function edit(k) {
            if (currentUserRole !== 'admin') {
                alert("You do not have permission to edit transactions.");
                return;
            }

            db.child(k).once("value", snap => {
                let d = snap.val();

                document.getElementById("key").value = k;
                document.getElementById("uid").value = d.uid;
                document.getElementById("name").value = d.name;
                document.getElementById("description").value = d.description;
                document.getElementById("amount").value = d.amount;
                let parsedDate = parseDateForInput(d.date);

                // Set the value of the actual date input
                document.getElementById("date").value = parsedDate;

                // IMPORTANT: Tell the flatpickr instance to update its displayed date
                if (datePickerInstance) {
                    datePickerInstance.setDate(parsedDate, true);
                }

                document.getElementById("updateBtn").classList.remove("d-none");
                document.getElementById("saveBtn").classList.add("d-none");

                // Ensure modal is shown correctly
                new bootstrap.Modal(document.getElementById('modal')).show();
            });
        }

        // MODIFIED: `update` function to remove redundant `load()` call and properly close modal
        function update() {
            if (currentUserRole !== 'admin') {
                alert("You do not have permission to update transactions.");
                return;
            }

            let k = document.getElementById("key").value;

            let date = document.getElementById("date").value || (() => {
                let d = new Date();
                let day = String(d.getDate()).padStart(2, '0');
                let month = String(d.getMonth() + 1).padStart(2, '0');
                let year = d.getFullYear();
                return `${day}-${month}-${year}`;
            })();

            db.child(k).update({
                uid: document.getElementById("uid").value,
                name: document.getElementById("name").value,
                description: document.getElementById("description").value,
                amount: document.getElementById("amount").value,
                date
            }).then(() => {
                // The `db.on("value")` listener in `load()` will automatically re-render the table.
                // No explicit `load()` call needed here.
            });

            clear();
            $('#modal').modal('hide'); // Proper way to close Bootstrap modal
        }

        // MODIFIED: `removeRow` function to remove redundant `load()` call
        function removeRow(k) {
            if (currentUserRole !== 'admin') {
                alert("You do not have permission to delete transactions.");
                return;
            }

            if (confirm("Delete record?")) {
                db.child(k).remove().then(() => {
                    // The `db.on("value")` listener in `load()` will automatically re-render the table.
                    // No explicit `load()` call needed here.
                }).catch((err) => {
                    console.error('Delete error:', err);
                });
            }
        }

        function clear() {
            document.getElementById("uid").value = "";
            document.getElementById("name").value = "";
            document.getElementById("description").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("date").value = ""; // Clear the hidden input
            document.getElementById("key").value = "";

            if (datePickerInstance) {
                datePickerInstance.clear(true);
                datePickerInstance.setDate(new Date()); // Set back to default or empty if preferred
            }

            document.getElementById("updateBtn").classList.add("d-none");
            document.getElementById("saveBtn").classList.remove("d-none");
        }


        // MODIFIED: `filterTable` to use `allTransactionsData` instead of re-fetching
        function filterTable() {
            let selectedMonth = document.getElementById("filterMonth").value;
            let selectedDate = document.getElementById("filterDate").value;
            let selectedUid = document.getElementById("filterUid").value;
            let selectedName = document.getElementById("filterName").value;
            let selectedDescription = document.getElementById("filterDescription").value;
            let selectedAmount = document.getElementById("filterAmount").value;

            let tbody = document.getElementById("tbody");
            tbody.innerHTML = ''; // Clear existing rows to rebuild

            let filteredTotal = 0;
            let visibleRowCount = 0;
            let currentSN = 1;

            // Use the globally stored data `allTransactionsData`
            const filteredData = allTransactionsData.filter(r => {
                let dateStr = r.date;
                let parts = dateStr.split(/[-\/]/);
                let monthNum;
                if (parts.length === 3) {
                    if (parts[0].length === 4) { // assume YYYY-MM-DD
                        monthNum = parseInt(parts[1]);
                    } else { // assume DD-MM-YYYY
                        monthNum = parseInt(parts[1]);
                    }
                } else {
                    let dateObj = new Date(dateStr);
                    monthNum = dateObj.getMonth() + 1;
                }

                let amountNum = Number(r.amount) || 0;

                return (!selectedMonth || String(monthNum) === selectedMonth) &&
                       (!selectedDate || r.date === selectedDate) &&
                       (!selectedUid || r.uid === selectedUid) &&
                       (!selectedName || r.name === selectedName) &&
                       (!selectedDescription || r.description === selectedDescription) &&
                       (!selectedAmount || String(amountNum) === selectedAmount);
            });

            filteredData.forEach(r => {
                let amountNum = Number(r.amount) || 0;
                filteredTotal += amountNum;
                visibleRowCount++;

                let dateStr = r.date;
                let parts = dateStr.split(/[-\/]/);
                let monthNum;
                if (parts.length === 3) {
                    if (parts[0].length === 4) { // assume YYYY-MM-DD
                        monthNum = parseInt(parts[1]);
                    } else { // assume DD-MM-YYYY
                        monthNum = parseInt(parts[1]);
                    }
                } else {
                    let dateObj = new Date(dateStr);
                    monthNum = dateObj.getMonth() + 1;
                }

                let controlButtons = '';
                if (currentUserRole === 'admin') {
                    controlButtons = `
                        <button class="btn btn-sm btn-warning me-1" onclick="edit('${r.key}')">
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="removeRow('${r.key}')">
                            Delete
                        </button>
                    `;
                } else if (currentUserRole === 'guest') {
                    controlButtons = `
                        <button class="btn btn-sm btn-warning me-1" disabled>
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" disabled>
                            Delete
                        </button>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${currentSN++}</td>
                        <td>${monthNum}</td>
                        <td>${r.date}</td>
                        <td>${r.uid}</td>
                        <td>${r.name}</td>
                        <td>${r.description}</td>
                        <td>${amountNum.toLocaleString()}</td>
                        <td class="table-control-cell">
                            ${controlButtons}
                        </td>
                    </tr>
                `;
            });

            document.getElementById("total").innerText = filteredTotal.toLocaleString();
            document.getElementById("ppleCont").innerText = visibleRowCount;
        }

    </script>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-success" id="saveBtn" onclick="save()">Save</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // DOMContentLoaded ensures the DOM is fully loaded before these scripts run.
        $(document).ready(function() {
            // Initialize flatpickr on the date input
            datePickerInstance = flatpickr("#date", {
                dateFormat: "d-m-Y",
                defaultDate: new Date()
            });

            // Initialize Select2 filters after the DOM and jQuery are ready
            // and after filter options might have been populated by renderTableAndFilters.
            initSelect2Filters();

            // Event listener for clearFilters button, ensuring the element exists
            document.getElementById("clearFilters").addEventListener("click", () => {
                // Reset native select elements and then trigger change for Select2 to update
                document.getElementById("filterMonth").value = "";
                document.getElementById("filterDate").value = "";
                document.getElementById("filterUid").value = "";
                document.getElementById("filterName").value = "";
                document.getElementById("filterDescription").value = "";
                document.getElementById("filterAmount").value = "";

                // Use jQuery to trigger the 'change' event which Select2 listens to
                $('#filterMonth, #filterDate, #filterUid, #filterName, #filterDescription, #filterAmount').val('').trigger('change');
                // The 'change' trigger from .val('').trigger('change') will call filterTable.
            });

            // NEW FIX: Reset modal state after it's fully hidden
            $('#modal').on('hidden.bs.modal', function () {
                clear(); // Call clear function to reset fields and button states
            });
        });
    </script>
